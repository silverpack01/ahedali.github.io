<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA | ADMIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;900&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:          #03040f;
            --bg-card:     #070b1a;
            --border:      #0f1f4a;
            --neon-blue:   #4d8aff;
            --neon-purple: #9b5de5;
            --neon-cyan:   #00d4ff;
            --neon-green:  #00ff88;
            --neon-yellow: #ffe94d;
            --neon-pink:   #ff4df7;
            --neon-red:    #ff4444;
            --text:        #c8d8ff;
            --text-dim:    #5a72aa;
            --text-bright: #e8f0ff;
            --font-mono:   'JetBrains Mono', monospace;
            --font-disp:   'Exo 2', sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-mono);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        #login-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 32px;
        }

        .login-box {
            border: 1px solid var(--border);
            padding: 48px 40px;
            background: var(--bg-card);
            width: 380px;
            position: relative;
        }

        .login-box::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            background: linear-gradient(135deg, var(--neon-blue), transparent 50%, var(--neon-purple));
            z-index: -1;
            opacity: 0.3;
        }

        .login-title {
            font-family: var(--font-disp);
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--neon-blue);
            text-align: center;
            margin-bottom: 8px;
            text-shadow: 0 0 24px rgba(77,138,255,0.5);
        }

        .login-sub {
            font-size: 10px;
            color: var(--text-dim);
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 32px;
        }

        .login-field {
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--border);
            background: rgba(3,4,15,0.8);
            padding: 0 14px;
            margin-bottom: 14px;
            transition: border-color 0.3s;
        }

        .login-field:focus-within { border-color: rgba(77,138,255,0.6); }
        .login-field span { color: var(--neon-blue); font-size: 15px; }

        .login-field input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--text);
            padding: 13px 0;
            letter-spacing: 1px;
        }

        .login-field input::placeholder { color: var(--text-dim); }

        .login-btn {
            width: 100%;
            padding: 13px;
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 3px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: color 0.3s;
            margin-top: 8px;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: var(--neon-blue);
            transition: left 0.3s ease;
            z-index: 0;
        }

        .login-btn span { position: relative; z-index: 1; }
        .login-btn:hover { color: var(--bg); }
        .login-btn:hover::before { left: 0; }
        .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .login-error {
            font-size: 11px;
            color: var(--neon-red);
            text-align: center;
            letter-spacing: 1px;
            min-height: 16px;
            margin-top: 12px;
        }

        #admin-panel { display: none; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            height: 64px;
            background: rgba(3,4,15,0.95);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: var(--font-disp);
            font-size: 18px;
            font-weight: 900;
            color: var(--neon-blue);
            letter-spacing: 4px;
            text-shadow: 0 0 18px rgba(77,138,255,0.6);
        }

        .logo span { color: #9b5de5; }
        .header-right { display: flex; align-items: center; gap: 20px; }

        .db-indicator {
            font-size: 10px;
            letter-spacing: 1px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .db-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--text-dim);
        }

        .db-dot.connected { background: var(--neon-green); box-shadow: 0 0 8px var(--neon-green); }
        .db-dot.error     { background: var(--neon-red);   box-shadow: 0 0 8px var(--neon-red); }

        .user-badge {
            font-size: 10px;
            letter-spacing: 1px;
            color: var(--neon-green);
            border: 1px solid rgba(0,255,136,0.3);
            padding: 4px 12px;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .logout-btn {
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--neon-red);
            border: 1px solid rgba(255,68,68,0.3);
            padding: 6px 14px;
            background: transparent;
            cursor: pointer;
            font-family: var(--font-mono);
            transition: background 0.2s, color 0.2s;
        }

        .logout-btn:hover { background: var(--neon-red); color: var(--bg); }

        .admin-main {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 0;
            min-height: calc(100vh - 64px);
        }

        .form-panel {
            border-right: 1px solid var(--border);
            padding: 32px 28px;
            background: rgba(7,11,26,0.6);
            overflow-y: auto;
        }

        .panel-title {
            font-family: var(--font-disp);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--neon-blue);
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .form-group { margin-bottom: 14px; }

        .form-label {
            font-size: 10px;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            margin-bottom: 6px;
            display: block;
        }

        .form-control {
            width: 100%;
            background: rgba(3,4,15,0.8);
            border: 1px solid var(--border);
            outline: none;
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text);
            padding: 10px 14px;
            letter-spacing: 0.5px;
            transition: border-color 0.3s;
        }

        .form-control:focus { border-color: rgba(77,138,255,0.5); }
        .form-control::placeholder { color: var(--text-dim); }
        select.form-control option { background: #070b1a; }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
            line-height: 1.5;
        }

        .img-input-row { display: flex; gap: 8px; align-items: stretch; }
        .img-input-row .form-control { flex: 1; }

        .btn-extract {
            padding: 0 14px;
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 1px;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            transition: background 0.2s, color 0.2s;
        }

        .btn-extract:hover { background: var(--neon-cyan); color: var(--bg); }

        .img-preview-wrap { margin-top: 8px; display: none; }

        .img-preview-wrap img {
            width: 100%;
            height: 90px;
            object-fit: cover;
            border: 1px solid var(--border);
            filter: saturate(0.75) brightness(0.9);
            display: block;
        }

        .img-status { font-size: 10px; letter-spacing: 1px; margin-top: 4px; }

        .form-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-add {
            padding: 12px;
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: color 0.3s;
        }

        .btn-add::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: var(--neon-green);
            transition: left 0.3s;
            z-index: 0;
        }

        .btn-add span { position: relative; z-index: 1; }
        .btn-add:hover { color: var(--bg); }
        .btn-add:hover::before { left: 0; }

        .btn-cancel {
            padding: 10px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: border-color 0.3s, color 0.3s;
            display: none;
        }

        .btn-cancel:hover { border-color: var(--neon-red); color: var(--neon-red); }

        .form-msg {
            font-size: 11px;
            letter-spacing: 1px;
            min-height: 16px;
            margin-top: 8px;
            text-align: center;
        }

        .list-panel { padding: 32px 28px; overflow-y: auto; }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .list-title {
            font-family: var(--font-disp);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--text-bright);
        }

        .project-count { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; }
        .filter-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }

        .tab {
            font-size: 10px;
            letter-spacing: 1.5px;
            padding: 5px 14px;
            border: 1px solid var(--border);
            color: var(--text-dim);
            cursor: pointer;
            background: transparent;
            font-family: var(--font-mono);
            transition: all 0.2s;
        }

        .tab.active { border-color: var(--neon-blue); color: var(--neon-blue); }
        .tab:hover  { border-color: var(--neon-blue); color: var(--neon-blue); }

        .project-row {
            border: 1px solid var(--border);
            background: var(--bg-card);
            padding: 16px 18px;
            margin-bottom: 10px;
            display: grid;
            grid-template-columns: 48px 1fr auto;
            gap: 14px;
            align-items: center;
            transition: border-color 0.2s;
        }

        .project-row:hover   { border-color: rgba(77,138,255,0.3); }
        .project-row.editing { border-color: var(--neon-blue); }

        .row-thumb { width: 48px; height: 48px; object-fit: cover; filter: saturate(0.6) brightness(0.8); }
        .row-info { min-width: 0; }

        .row-title {
            font-family: var(--font-disp);
            font-size: 13px;
            font-weight: 700;
            color: var(--text-bright);
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .row-meta { display: flex; gap: 10px; margin-top: 4px; align-items: center; }

        .row-tag { font-size: 9px; letter-spacing: 1px; padding: 2px 8px; border: 1px solid; }

        .tag-AI   { color: var(--neon-blue);   border-color: rgba(77,138,255,0.4); }
        .tag-AUTO { color: var(--neon-green);  border-color: rgba(0,255,136,0.4); }
        .tag-SEC  { color: var(--neon-yellow); border-color: rgba(255,233,77,0.4); }
        .tag-WEB  { color: var(--neon-pink);   border-color: rgba(255,77,247,0.4); }

        .row-desc {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .row-actions { display: flex; gap: 8px; flex-shrink: 0; }

        .btn-edit, .btn-delete {
            padding: 6px 12px;
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 1px;
            cursor: pointer;
            border: 1px solid;
            background: transparent;
            transition: all 0.2s;
        }

        .btn-edit   { color: var(--neon-blue); border-color: rgba(77,138,255,0.4); }
        .btn-delete { color: var(--neon-red);  border-color: rgba(255,68,68,0.4); }
        .btn-edit:hover   { background: var(--neon-blue); color: var(--bg); }
        .btn-delete:hover { background: var(--neon-red);  color: var(--bg); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
            font-size: 12px;
            letter-spacing: 1px;
            border: 1px dashed var(--border);
        }

        #confirm-modal {
            position: fixed;
            inset: 0;
            background: rgba(3,4,15,0.85);
            z-index: 9998;
            display: none;
            align-items: center;
            justify-content: center;
        }

        #confirm-modal.show { display: flex; }

        .modal-box {
            border: 1px solid var(--neon-red);
            background: var(--bg-card);
            padding: 36px 32px;
            width: 340px;
            text-align: center;
        }

        .modal-title {
            font-family: var(--font-disp);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--neon-red);
            margin-bottom: 10px;
        }

        .modal-msg { font-size: 12px; color: var(--text-dim); margin-bottom: 24px; line-height: 1.6; }
        .modal-actions { display: flex; gap: 12px; justify-content: center; }

        .btn-confirm-del {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .btn-confirm-del:hover { background: var(--neon-red); color: var(--bg); }

        .btn-cancel-del {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }

        .btn-cancel-del:hover { border-color: var(--text); color: var(--text); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); }

        @media (max-width: 800px) {
            .admin-main { grid-template-columns: 1fr; }
            .form-panel { border-right: none; border-bottom: 1px solid var(--border); }
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-overlay">
    <div class="login-box">
        <div class="login-title">[ALPHA]</div>
        <div class="login-sub">ADMIN ACCESS REQUIRED</div>
        <div class="login-field">
            <span>&gt;</span>
            <input type="email" id="inp-email" placeholder="EMAIL" autocomplete="off">
        </div>
        <div class="login-field">
            <span>&gt;</span>
            <input type="password" id="inp-pass" placeholder="PASSWORD" autocomplete="off">
        </div>
        <button class="login-btn" id="login-btn" onclick="doLogin()"><span>AUTHENTICATE</span></button>
        <div class="login-error" id="login-error"></div>
    </div>
</div>

<!-- DELETE CONFIRM -->
<div id="confirm-modal">
    <div class="modal-box">
        <div class="modal-title">CONFIRM DELETE</div>
        <div class="modal-msg" id="modal-msg"></div>
        <div class="modal-actions">
            <button class="btn-confirm-del" onclick="confirmDelete()">DELETE</button>
            <button class="btn-cancel-del" onclick="closeModal()">CANCEL</button>
        </div>
    </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
    <header>
        <div class="logo"><span>[</span>ALPHA<span>]</span> ADMIN</div>
        <div class="header-right">
            <div class="db-indicator">
                <div class="db-dot" id="db-dot"></div>
                <span id="db-status">CONNECTING...</span>
            </div>
            <div class="user-badge" id="user-badge"></div>
            <button class="logout-btn" onclick="doLogout()">LOGOUT</button>
        </div>
    </header>

    <div class="admin-main">

        <!-- Form -->
        <div class="form-panel">
            <div class="panel-title" id="form-title">>> ADD_PROJECT</div>

            <div class="form-group">
                <label class="form-label">PROJECT NAME</label>
                <input type="text" class="form-control" id="f-name" placeholder="e.g. MyAI Tool">
            </div>

            <div class="form-group">
                <label class="form-label">CATEGORY</label>
                <select class="form-control" id="f-cat">
                    <option value="AI">AI</option>
                    <option value="AUTO">AUTOMATION</option>
                    <option value="SEC">CYBERSECURITY</option>
                    <option value="WEB">WEB &amp; EXTENSIONS</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">DESCRIPTION</label>
                <textarea class="form-control" id="f-desc" placeholder="Short project description..."></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">GITHUB REPO URL</label>
                <input type="url" class="form-control" id="f-repo" placeholder="https://github.com/silverpack01/...">
            </div>

            <div class="form-group">
                <label class="form-label">IMAGE — Pexels Page Link</label>
                <div class="img-input-row">
                    <input type="text" class="form-control" id="f-img"
                        placeholder="https://www.pexels.com/photo/..."
                        oninput="parsePexels(this.value)">
                    <button type="button" class="btn-extract"
                        onclick="parsePexels(document.getElementById('f-img').value, true)">
                        EXTRACT
                    </button>
                </div>
                <div class="img-preview-wrap" id="img-preview-wrap">
                    <img id="img-preview" src="" alt="preview">
                    <div class="img-status" id="img-status"></div>
                </div>
            </div>

            <div class="form-actions">
                <button class="btn-add" onclick="saveProject()">
                    <span id="form-btn-text">ADD PROJECT</span>
                </button>
                <button class="btn-cancel" id="btn-cancel" onclick="resetForm()">CANCEL EDIT</button>
            </div>

            <div class="form-msg" id="form-msg"></div>
        </div>

        <!-- List -->
        <div class="list-panel">
            <div class="list-header">
                <div class="list-title">>> PROJECT_DATABASE</div>
                <div class="project-count" id="project-count">0 PROJECTS</div>
            </div>

            <div class="filter-tabs">
                <button class="tab active" onclick="setFilter('ALL', this)">ALL</button>
                <button class="tab" onclick="setFilter('AI', this)">AI</button>
                <button class="tab" onclick="setFilter('AUTO', this)">AUTOMATION</button>
                <button class="tab" onclick="setFilter('SEC', this)">CYBERSECURITY</button>
                <button class="tab" onclick="setFilter('WEB', this)">WEB</button>
            </div>

            <div id="project-list"></div>
        </div>

    </div>
</div>

<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
    getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
    getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey:            "AIzaSyCJVhjN4M-EDtZ-e5x2PpzLSAl5bUd_pSs",
    authDomain:        "alpha-portfolio-e0daf.firebaseapp.com",
    projectId:         "alpha-portfolio-e0daf",
    storageBucket:     "alpha-portfolio-e0daf.firebasestorage.app",
    messagingSenderId: "372148571408",
    appId:             "1:372148571408:web:2649567f16d2a6d40fa995"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
const COL  = 'projects';

// ===== DB status =====
function setDbStatus(state) {
    const dot = document.getElementById('db-dot');
    const lbl = document.getElementById('db-status');
    if (state === 'ok')    { dot.className = 'db-dot connected'; lbl.textContent = 'FIRESTORE_OK'; }
    if (state === 'error') { dot.className = 'db-dot error';     lbl.textContent = 'DB_ERROR'; }
    if (state === 'busy')  { dot.className = 'db-dot';           lbl.textContent = 'SYNCING...'; }
}

// ===== Auth state observer =====
onAuthStateChanged(auth, user => {
    if (user) {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('admin-panel').style.display   = 'block';
        document.getElementById('user-badge').textContent      = user.email;
        loadAndRender();
    } else {
        document.getElementById('admin-panel').style.display   = 'none';
        document.getElementById('login-overlay').style.display = 'flex';
    }
});

// ===== Login / Logout =====
window.doLogin = async function() {
    const email = document.getElementById('inp-email').value.trim();
    const pass  = document.getElementById('inp-pass').value;
    const err   = document.getElementById('login-error');
    const btn   = document.getElementById('login-btn');

    if (!email || !pass) { err.textContent = 'EMAIL and PASSWORD required.'; return; }

    btn.disabled = true;
    btn.querySelector('span').textContent = 'AUTHENTICATING...';
    err.textContent = '';

    try {
        await signInWithEmailAndPassword(auth, email, pass);
        // onAuthStateChanged handles the rest
    } catch (e) {
        err.textContent = 'ACCESS DENIED — ' + firebaseAuthError(e.code);
        btn.disabled = false;
        btn.querySelector('span').textContent = 'AUTHENTICATE';
        document.getElementById('inp-pass').value = '';
    }
};

window.doLogout = async function() {
    await signOut(auth);
};

document.getElementById('inp-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.doLogin();
});

function firebaseAuthError(code) {
    const map = {
        'auth/user-not-found':   'USER NOT FOUND',
        'auth/wrong-password':   'WRONG PASSWORD',
        'auth/invalid-email':    'INVALID EMAIL',
        'auth/too-many-requests':'TOO MANY ATTEMPTS',
        'auth/invalid-credential': 'INVALID CREDENTIALS',
    };
    return map[code] || code.toUpperCase();
}

// ===== Firestore =====
let allProjects   = [];
let currentFilter = 'ALL';

async function loadAndRender() {
    setDbStatus('busy');
    try {
        const snap = await getDocs(query(collection(db, COL), orderBy('added', 'desc')));
        allProjects = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        setDbStatus('ok');
        renderList();
    } catch (e) {
        setDbStatus('error');
        showMsg('LOAD ERROR: ' + e.message, 'red');
    }
}

// ===== Filter =====
window.setFilter = function(cat, btn) {
    currentFilter = cat;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderList();
};

// ===== Render =====
function renderList() {
    const filtered = currentFilter === 'ALL'
        ? allProjects
        : allProjects.filter(p => p.cat === currentFilter);

    document.getElementById('project-count').textContent =
        allProjects.length + ' PROJECT' + (allProjects.length !== 1 ? 'S' : '');

    const list     = document.getElementById('project-list');
    const fallback = 'https://images.pexels.com/photos/1181244/pexels-photo-1181244.jpeg';

    if (!filtered.length) {
        list.innerHTML = '<div class="empty-state">NO PROJECTS FOUND<br><br>Add your first project using the form.</div>';
        return;
    }

    list.innerHTML = filtered.map(p => `
        <div class="project-row" id="row-${p.id}">
            <img class="row-thumb" src="${p.img || fallback}" alt="${p.name}"
                onerror="this.src='${fallback}'">
            <div class="row-info">
                <div class="row-title">${p.name}</div>
                <div class="row-meta"><span class="row-tag tag-${p.cat}">${p.cat}</span></div>
                <div class="row-desc">${p.desc}</div>
            </div>
            <div class="row-actions">
                <button class="btn-edit"   onclick="editProject('${p.id}')">EDIT</button>
                <button class="btn-delete" onclick="askDelete('${p.id}', '${p.name.replace(/'/g, "\\'")}')">DEL</button>
            </div>
        </div>
    `).join('');
}

// ===== Pexels Parser =====
window.parsePexels = function(val, force) {
    const wrap    = document.getElementById('img-preview-wrap');
    const status  = document.getElementById('img-status');
    const preview = document.getElementById('img-preview');
    const input   = document.getElementById('f-img');

    if (!val.trim()) { wrap.style.display = 'none'; return; }

    const match = val.match(/pexels\.com\/photo\/[^?#]*?(\d{5,})\/?(?:[?#].*)?$/);
    if (match) {
        const id     = match[1];
        const direct = 'https://images.pexels.com/photos/' + id + '/pexels-photo-' + id + '.jpeg?auto=compress&cs=tinysrgb&w=600';
        input.value  = direct;
        showPreview(direct, wrap, preview, status);
        return;
    }

    if (force || val.indexOf('images.pexels.com') !== -1 || /\.(jpg|jpeg|png|webp)(\?|$)/i.test(val)) {
        showPreview(val, wrap, preview, status);
    }
};

function showPreview(url, wrap, preview, status) {
    wrap.style.display = 'block';
    status.style.color = 'var(--text-dim)';
    status.textContent = 'LOADING...';
    preview.src = url;
    preview.onload  = () => { status.style.color = 'var(--neon-green)'; status.textContent = 'IMAGE_OK'; };
    preview.onerror = () => { status.style.color = 'var(--neon-red)';   status.textContent = 'IMAGE_NOT_FOUND'; };
}

// ===== Form =====
let editingId = null;

function showMsg(text, color) {
    const msg = document.getElementById('form-msg');
    msg.style.color = color === 'red' ? 'var(--neon-red)' : 'var(--neon-green)';
    msg.textContent = text;
    setTimeout(() => msg.textContent = '', 3000);
}

window.saveProject = async function() {
    const name = document.getElementById('f-name').value.trim();
    const cat  = document.getElementById('f-cat').value;
    const desc = document.getElementById('f-desc').value.trim();
    const repo = document.getElementById('f-repo').value.trim();
    const img  = document.getElementById('f-img').value.trim();

    if (!name || !desc) { showMsg('NAME and DESCRIPTION are required.', 'red'); return; }

    const btnTxt = document.getElementById('form-btn-text');
    btnTxt.textContent = 'SAVING...';
    setDbStatus('busy');

    try {
        if (editingId) {
            await updateDoc(doc(db, COL, editingId), { name, cat, desc, repo, img });
            const idx = allProjects.findIndex(p => p.id === editingId);
            if (idx !== -1) allProjects[idx] = { id: editingId, name, cat, desc, repo, img };
            showMsg('PROJECT UPDATED', 'green');
        } else {
            const ref = await addDoc(collection(db, COL), { name, cat, desc, repo, img, added: Date.now() });
            allProjects.unshift({ id: ref.id, name, cat, desc, repo, img, added: Date.now() });
            showMsg('PROJECT ADDED', 'green');
        }
        setDbStatus('ok');
        resetForm();
        renderList();
    } catch (e) {
        setDbStatus('error');
        showMsg('SAVE FAILED: ' + e.message, 'red');
        btnTxt.textContent = editingId ? 'UPDATE PROJECT' : 'ADD PROJECT';
    }
};

window.editProject = function(id) {
    const p = allProjects.find(x => x.id === id);
    if (!p) return;

    editingId = id;
    document.getElementById('f-name').value = p.name;
    document.getElementById('f-cat').value  = p.cat;
    document.getElementById('f-desc').value = p.desc;
    document.getElementById('f-repo').value = p.repo || '';
    document.getElementById('f-img').value  = p.img  || '';

    if (p.img) showPreview(p.img,
        document.getElementById('img-preview-wrap'),
        document.getElementById('img-preview'),
        document.getElementById('img-status')
    );

    document.getElementById('form-title').textContent    = '>> EDIT_PROJECT';
    document.getElementById('form-btn-text').textContent = 'UPDATE PROJECT';
    document.getElementById('btn-cancel').style.display  = 'block';

    document.querySelector('.form-panel').scrollIntoView({ behavior: 'smooth' });
    document.querySelectorAll('.project-row').forEach(r => r.classList.remove('editing'));
    const row = document.getElementById('row-' + id);
    if (row) row.classList.add('editing');
};

window.resetForm = function() {
    editingId = null;
    ['f-name', 'f-desc', 'f-repo', 'f-img'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-cat').value               = 'AI';
    document.getElementById('form-title').textContent    = '>> ADD_PROJECT';
    document.getElementById('form-btn-text').textContent = 'ADD PROJECT';
    document.getElementById('btn-cancel').style.display  = 'none';
    document.getElementById('form-msg').textContent      = '';
    document.getElementById('img-preview-wrap').style.display = 'none';
    document.querySelectorAll('.project-row').forEach(r => r.classList.remove('editing'));
};

// ===== Delete =====
let deleteTargetId = null;

window.askDelete = function(id, name) {
    deleteTargetId = id;
    document.getElementById('modal-msg').textContent = 'Delete "' + name + '"? This cannot be undone.';
    document.getElementById('confirm-modal').classList.add('show');
};

window.confirmDelete = async function() {
    if (!deleteTargetId) return;
    setDbStatus('busy');
    try {
        await deleteDoc(doc(db, COL, deleteTargetId));
        allProjects = allProjects.filter(p => p.id !== deleteTargetId);
        setDbStatus('ok');
    } catch (e) {
        setDbStatus('error');
        showMsg('DELETE FAILED: ' + e.message, 'red');
    }
    deleteTargetId = null;
    closeModal();
    if (editingId) window.resetForm();
    renderList();
};

window.closeModal = function() {
    deleteTargetId = null;
    document.getElementById('confirm-modal').classList.remove('show');
};
</script>
